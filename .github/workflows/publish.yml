name: Build and Publish Skynet Libraries

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "VERSION"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install all packages
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check packages/
      - name: Format check
        run: uv run ruff format --check packages/
      - name: Tests
        # Exit code 5 = "no tests collected" — accepted while packages
        # are young and have no tests yet. Remove once tests exist.
        run: |
          set +e
          uv run pytest packages/ -v
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected, continuing."
            exit 0
          fi
          exit $rc

  publish:
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    # One job handles all packages sequentially. A matrix here would
    # require 4 runner restarts (runner exits clean after each job, and
    # the skynet-lib deployment only has 1 replica) which causes random
    # "no runner available" failures.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build all packages
        run: |
          set -euo pipefail
          for pkg in skynet-core skynet-qdrant skynet-embedding skynet-matrix; do
            uv build "packages/$pkg" --out-dir "packages/$pkg/dist"
          done
      - name: Publish all packages to Nexus
        env:
          NEXUS_URL: http://nexus.nexus.svc:8081/repository/pypi-hosted/
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          set -euo pipefail
          # DEBUG: confirm the secret we got has the same content as the
          # Vault-sourced K8s secret (without revealing the value itself).
          echo "user_len=${#NEXUS_USER} pass_len=${#NEXUS_PASS}"
          printf '%s' "$NEXUS_PASS" | sha256sum | cut -c1-16
          # Quick auth sanity check against the known-good status endpoint.
          http=$(curl -sS -o /dev/null -w "%{http_code}" -u "$NEXUS_USER:$NEXUS_PASS" \
            http://nexus.nexus.svc:8081/service/rest/v1/status)
          echo "status_endpoint_auth=$http"
          # `uv publish` was returning 401 from this runner while a plain
          # curl upload with the same creds succeeds. Skip uv publish and
          # POST the wheels directly to the pypi-hosted upload endpoint.
          for pkg in skynet-core skynet-qdrant skynet-embedding skynet-matrix; do
            for f in "packages/$pkg"/dist/*; do
              echo "Uploading $f"
              set +e
              http=$(curl -sS -o /tmp/upload_resp.txt -w "%{http_code}" \
                -u "$NEXUS_USER:$NEXUS_PASS" \
                -F "$(basename $f)=@$f" \
                "$NEXUS_URL")
              rc=$?
              set -e
              if [ $rc -ne 0 ]; then
                echo "curl failed ($rc)"
                cat /tmp/upload_resp.txt
                exit $rc
              fi
              case "$http" in
                2??)
                  echo "  -> $http OK"
                  ;;
                400|409)
                  if grep -qiE "already|duplicate|exists" /tmp/upload_resp.txt; then
                    echo "  -> $http already uploaded, skipping"
                  else
                    echo "  -> $http bad request:"
                    cat /tmp/upload_resp.txt
                    exit 1
                  fi
                  ;;
                *)
                  echo "  -> $http:"
                  head -c 500 /tmp/upload_resp.txt
                  exit 1
                  ;;
              esac
            done
          done
