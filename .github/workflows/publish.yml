name: Build and Publish Skynet Libraries

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "VERSION"
      - ".github/workflows/publish.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Install all packages
        run: uv sync --all-packages
      - name: Lint
        run: uv run ruff check packages/
      - name: Format check
        run: uv run ruff format --check packages/
      - name: Tests
        # Exit code 5 = "no tests collected" — accepted while packages
        # are young and have no tests yet. Remove once tests exist.
        run: |
          set +e
          uv run pytest packages/ -v
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected, continuing."
            exit 0
          fi
          exit $rc

  publish:
    needs: lint-test
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    # One job handles all packages sequentially. A matrix here would
    # require 4 runner restarts (runner exits clean after each job, and
    # the skynet-lib deployment only has 1 replica) which causes random
    # "no runner available" failures.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Build all packages
        run: |
          set -euo pipefail
          for pkg in skynet-core skynet-qdrant skynet-embedding skynet-matrix skynet-scoring skynet-graph skynet-retrieval skynet-consolidation skynet-vault skynet-postgres skynet-mcp skynet-vibe skynet-impulse skynet-providers skynet-capture skynet-taste; do
            uv build "packages/$pkg" --out-dir "packages/$pkg/dist"
          done
      - name: Publish all packages to Nexus
        env:
          UV_PUBLISH_URL: http://nexus.nexus.svc:8081/repository/pypi-hosted/
          UV_PUBLISH_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          set -euo pipefail
          for pkg in skynet-core skynet-qdrant skynet-embedding skynet-matrix skynet-scoring skynet-graph skynet-retrieval skynet-consolidation skynet-vault skynet-postgres skynet-mcp skynet-vibe skynet-impulse skynet-providers skynet-capture skynet-taste; do
            set +e
            uv publish "packages/$pkg"/dist/* 2>&1 | tee /tmp/publish.log
            rc=$?
            set -e
            if [ $rc -ne 0 ]; then
              if grep -qiE "already|duplicate|exists|409" /tmp/publish.log; then
                echo "$pkg already published at this version, skipping."
                continue
              fi
              exit $rc
            fi
          done
