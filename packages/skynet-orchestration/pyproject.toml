[project]
name = "skynet-orchestration"
version = "2026.4.25.1"
description = "Skynet agent-to-agent orchestration: envelopes, gates (cycle/repeat/justification/convergence), shared budget, self-estimation, calibration, FastAPI server + httpx client. One protocol for every sub-agent."
requires-python = ">=3.12"
dependencies = [
    "skynet-core>=2026.4.6",
    "skynet-embedding>=2026.4.0",
    "pydantic>=2.6",
    "redis>=5.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.110",
]
matrix = [
    "skynet-matrix>=2026.4.24",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
