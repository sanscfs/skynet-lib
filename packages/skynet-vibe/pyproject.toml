[project]
name = "skynet-vibe"
version = "2026.4.20.2"
description = "Universal vibe signal system: domain-as-prototype preference capture and retrieval"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pyyaml>=6.0",
    "skynet-core>=2026.4.2",
    "skynet-embedding>=2026.4.2",
    "skynet-qdrant>=2026.4.9",
    "skynet-scoring>=2026.4.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skynet_vibe"]

[tool.hatch.build.targets.wheel.force-include]
"src/skynet_vibe/emoji_vectors.json" = "skynet_vibe/emoji_vectors.json"
"src/skynet_vibe/config/default_prototypes.yaml" = "skynet_vibe/config/default_prototypes.yaml"
