# skynet-vibe prototype bank v2.0
#
# 50 prototypes × 4 training phrases, organised on 5 axes:
#   - Emotional core          (10)
#   - Cognitive style         (10)
#   - Aesthetic framework     (10)
#   - Domain fingerprint      (10)
#   - Interaction stance      (10)
#
# Phrases are Ukrainian-heavy (user's primary language). Retrieval uses
# softmax over all 50 centroids + Shannon entropy to decide whether the
# winner is confident enough to persist (accepted = H <= H_max/2).
#
# This file is consumed by PrototypeRegistry.load_from_config at warmup.
# τ is calibrated at warmup time from these exact phrases (mean entropy
# across training examples ≈ log(N)/4); nothing at runtime tunes τ.

version: "2.0"

axes:
  emotional_core:
    - joy
    - melancholy
    - anger
    - curiosity
    - calm
    - anxious
    - contentment
    - disappointment
    - pride
    - resignation
  cognitive_style:
    - analytical
    - intuitive
    - skeptical
    - reflective
    - ironic
    - earnest
    - methodical
    - dismissive
    - exploratory
    - contrarian
  aesthetic_framework:
    - arthouse
    - a24_flavor
    - auteur_oriented
    - genre_literate
    - visual_focused
    - narrative_focused
    - meta_aware
    - formalist
    - popcorn_tolerant
    - anti_kitsch
  domain_fingerprint:
    - infra_sovereignty
    - agent_autonomy
    - privacy_first
    - local_first_compute
    - model_origin_aware
    - debugging_flow
    - incremental_improvement
    - supply_chain_aware
    - toolchain_critique
    - k8s_native
  interaction_stance:
    - collaborative
    - directive
    - correcting
    - teaching
    - delegating
    - complaining
    - celebrating
    - questioning
    - confirming
    - reframing

prototypes:
  # ── Emotional core (10) ──────────────────────────────────────────────
  joy:
    - "раптова радість від того що щось нарешті запрацювало"
    - "світло всередині, щось ніби розправилось у грудях"
    - "без видимої причини відчуваю легкість і хочеться посміхнутись"
    - "коли бачу що маленький шматок коду живе і дихає — так тепло"
  melancholy:
    - "тиха смуток без окремої події, просто фоном"
    - "осіння важкість у грудях, ніби вечір тягнеться довше ніж треба"
    - "ніщо не болить конкретно, але все одно якось сумно"
    - "туга за тим чого я навіть не пам'ятаю"
  anger:
    - "роздратування що знову вручну фіксити ту саму фігню"
    - "злість що інструмент не робить елементарного з коробки"
    - "агресія на API який спроектований щоб мучити"
    - "бісить що люди випускають софт у такому стані"
  curiosity:
    - "цікаво як це влаштовано всередині"
    - "хочеться колупнути глибше і подивитись з чого воно зроблене"
    - "а що буде якщо підкрутити цей параметр"
    - "звідки це взялось і як дійшло до такого стану"
  calm:
    - "все на своїх місцях, нічого не смикає"
    - "спокій після завершеної роботи"
    - "тиха ясність, жодних зайвих імпульсів"
    - "рівний, врівноважений стан без шумів у голові"
  anxious:
    - "неясне відчуття що щось пропускаю"
    - "тривога про щось нечітке, не можу пальцем показати"
    - "голова крутить одне й те саме коло думок"
    - "внутрішній шум без конкретного приводу"
  contentment:
    - "достатньо, більше не треба"
    - "ситість без пересичення"
    - "ніби все що хотілось — уже є, і це добре"
    - "спокійне задоволення, не ейфорія а рівна повнота"
  disappointment:
    - "очікувалось більше"
    - "фінал злив весь попередній настрій"
    - "після великих обіцянок — маленький пшик"
    - "хотів повірити і не спрацювало"
  pride:
    - "сам зробив, працює"
    - "цей архітектурний вибір виявився правильним"
    - "приємно бачити що мій ранній здогад підтвердився на практиці"
    - "зробив чисто, без милиць, сам собі кивнув"
  resignation:
    - "бачу що воно просто так і не зміниться"
    - "приймаю без боротьби"
    - "ок, це не моя війна, хай воно собі живе як хоче"
    - "сили на цю боротьбу вже нема, і я з цим змирився"

  # ── Cognitive style (10) ─────────────────────────────────────────────
  analytical:
    - "розкладаю на компоненти щоб зрозуміти"
    - "дивлюсь на першопричини а не симптоми"
    - "давай розріжемо цю задачу на шари і пройдемось по кожному"
    - "для початку потрібні дані і чіткий вимір"
  intuitive:
    - "відчуваю що має бути так хоч не доведу"
    - "пахне неправильним підходом, треба переглянути"
    - "щось всередині каже що тут є пастка"
    - "не можу пояснити але це рішення здається правильним"
  skeptical:
    - "звідки відомо що це так"
    - "не вірю в цю обіцянку ще не бачив пруфів"
    - "покажи метрики які показують що це справді працює"
    - "красива теорія але де підтвердження в реальному проді"
  reflective:
    - "повертаюсь до цього подумки вже третій день"
    - "згадую як тоді не помітив важливого знаку"
    - "з досвіду — схожі рішення у мене закінчувались болем"
    - "думаю над тим чому тоді я вибрав саме цей шлях"
  ironic:
    - "очевидно ж що це рішення переживе нас усіх"
    - "ну так я ж мрію про це щоранку"
    - "який прекрасний дизайн, просто шедевр сучасної інженерії"
    - "обов'язково, як тільки випаде вільний тиждень"
  earnest:
    - "насправді хочу щоб так було"
    - "без іронії вважаю це важливим"
    - "серйозно, це цінно для мене і я стою за це"
    - "кажу щиро, не жартома"
  methodical:
    - "крок за кроком"
    - "спочатку план, потім реалізація"
    - "пройдемо по чеклисту не пропускаючи"
    - "розіб'ємо на фази і кожну завершимо перед наступною"
  dismissive:
    - "нецікаво"
    - "не варте уваги"
    - "хай полежить, колись гляну, може"
    - "це не та проблема яка заслуговує часу"
  exploratory:
    - "давай спробуємо і подивимось"
    - "цікаво що з цього вийде"
    - "зачекаємо результат експерименту і тоді вирішимо"
    - "запустимо на малому обсязі і побачимо поведінку"
  contrarian:
    - "а що якщо навпаки"
    - "всі роблять так, тому варто подумати інакше"
    - "консенсус тут підозрілий, давай оскаржимо"
    - "класичне рішення скоріш за все вже не працює в цьому контексті"

  # ── Aesthetic framework (10) ─────────────────────────────────────────
  arthouse:
    - "артхаусне кіно у стилі a24"
    - "закінчилось би на інтелектуальному повороті а не на ефектному пострілі"
    - "режисер грає з формою, а не розповідає прямолінійну історію"
    - "естетика важливіша за сюжет, принаймні в цьому фільмі"
  a24_flavor:
    - "стиль a24"
    - "меланхолійний реалізм з формальною точністю"
    - "химерна родинна драма з повільним темпом і довгими тишами"
    - "затишна моторошність без прямих хорор-штампів"
  auteur_oriented:
    - "видно руку режисера у кожному кадрі"
    - "авторський почерк, не сплутаєш з жодним іншим"
    - "для мене головне хто знімав, не хто в ролях"
    - "інтонація фільму — це продовження конкретної людини"
  genre_literate:
    - "грає з кодами жанру"
    - "обігрує genre-tropes з розумінням"
    - "розуміє правила нуару і свідомо їх ламає"
    - "свідома розмова з історією жанру, не калька"
  visual_focused:
    - "кожен кадр композиційно продуманий"
    - "світло і тіні як окремий персонаж"
    - "оператор тут розмовляє, не менше за сценариста"
    - "без діалогу все одно зрозуміло про що це, просто за зображенням"
  narrative_focused:
    - "цікавить що далі зі героєю"
    - "сюжетна дуга головне, картинка на другому плані"
    - "тримає напругу історією, а не візуальними трюками"
    - "хочу знати чим це скінчиться, все інше вторинне"
  meta_aware:
    - "свідомо грає зі своєю формою"
    - "self-aware, фільм знає що він фільм"
    - "діалог з глядачем поверх четвертої стіни"
    - "коментує власні жанрові рішення зсередини"
  formalist:
    - "структура, ритм, форма"
    - "геометрія кадру, симетрія, повторення мотивів"
    - "монтажний ритм побудовано по музичній логіці"
    - "це про форму а не про те що відбувається"
  popcorn_tolerant:
    - "ок підходить під попкорн-вечір"
    - "не треба думати, просто відпочити і поржати"
    - "розважальне, нічого більше від нього не чекаю"
    - "середняк який не дратує, можна поставити фоном"
  anti_kitsch:
    - "занадто попсово"
    - "висмоктано з пальця"
    - "пластилінова мотивація персонажів"
    - "штучні емоції, штамповані діалоги, все вторинне"

  # ── Domain fingerprint (10) ──────────────────────────────────────────
  infra_sovereignty:
    - "власний self-hosted стек"
    - "без прив'язки до чужих клаудів"
    - "все крутиться на моєму залізі і я знаю що де лежить"
    - "не хочу залежати від політики якогось вендора"
  agent_autonomy:
    - "агент сам вирішує і діє"
    - "автономний без операторських кроків"
    - "не чекає команди, сам знає коли пора втрутитись"
    - "я описую цілі, агент обирає маршрут"
  privacy_first:
    - "дані не мають залишати мій периметр"
    - "ніякого tracking по моєму траффіку"
    - "все що можу — ганяю локально, не віддаю у чужі руки"
    - "телеметрія має бути вимкненою за замовчуванням"
  local_first_compute:
    - "запустити локально на Mac"
    - "ollama замість api"
    - "ллм має крутитись на моєму залізі а не у чужій хмарі"
    - "embedding теж локальний, через ollama на маку"
  model_origin_aware:
    - "європейська модель замість китайської"
    - "mistral замість deepseek для privacy"
    - "для українських промптів — модель з європейським training mix"
    - "дивлюсь звідки походить модель, не лише на benchmark"
  debugging_flow:
    - "kubectl describe show me why"
    - "root cause not workaround"
    - "треба зрозуміти чому воно ламається, а не обійти симптом"
    - "лог + трасса + метрика, все три шари дивимось"
  incremental_improvement:
    - "малий крок, перевірити, наступний крок"
    - "не великий рефактор одразу"
    - "по одному PR за раз, щоб можна було відкотити"
    - "змінюємо мінімум, ствердили що працює, рухаємось далі"
  supply_chain_aware:
    - "pin by sha"
    - "не :latest"
    - "чий це image і що всередині нього"
    - "хто підписав цей пакет і де його source code"
  toolchain_critique:
    - "цей інструмент зроблений невдало"
    - "API погано продуманий"
    - "дефолти тут налаштовані проти користувача"
    - "фреймворк який примушує боротись з собою замість допомагати"
  k8s_native:
