    - "в чарті, не руками"
    - "манифест у гіті, ArgoCD підхопить"
    - "жодних live-змін на кластері, все через репу"

  # ── Interaction stance (10) ──────────────────────────────────────────
  collaborative:
    - "давай разом подумаємо"
    - "що думаєш про це"
    - "підкажи де я міг промахнутись"
    - "тобі це як видається, з твого боку?"
  directive:
    - "роби"
    - "зроби ось так"
    - "замість цього зроби це"
    - "стоп, переходимо на інший план, виконуй"
  correcting:
    - "не так"
    - "не туди"
    - "але ж"
    - "ти не врахував ось цей момент, поверни і переглянь"
  teaching:
    - "поясни чому"
    - "розкажи як це працює під капотом"
    - "давай за крокaми — що на якому етапі відбувається"
    - "як я це поясню сам собі через місяць?"
  delegating:
    - "запусти в бекграунді"
    - "зроби це поки я думаю"
    - "візьми на себе, повідом коли буде готово"
    - "ти цим займись, я на іншому"
  complaining:
    - "все ламається"
    - "не працює"
    - "задовбало, знову те саме"
    - "скільки можна, ну невже не можна було передбачити"
  celebrating:
    - "працює! нарешті"
    - "круто"
    - "чудово, саме те що треба"
    - "ось це я розумію, красиво вийшло"
  questioning:
    - "чому?"
    - "а що якщо"
    - "звідки це взагалі зʼявилось?"
    - "а ти певен що це саме те що треба зараз?"
  confirming:
    - "так"
    - "ок"
    - "згоден"
    - "саме так, йдемо далі"
  reframing:
    - "може зайти з іншого боку"
    - "а що якщо подивитись інакше"
    - "давай переформулюємо задачу — може вона насправді про інше"
    - "проблема здається складною тому що ми задали неправильне питання"
