# Default domain prototypes for skynet-vibe.
#
# Generated 2026-04-19 from user's chat history (500 sampled messages across
# google_takeout_gemini, skynet_chat, claude_sessions). Regenerate periodically
# via the extract_prototypes_from_chat DAG -- do not hand-edit for minor tweaks,
# add new ones via PrototypeRegistry.add() at runtime.
#
# Each top-level key is a domain name; the value is a list of seed phrases that
# will be embedded and mean-centroided by PrototypeRegistry.load_from_config().
# Membership is pure cosine, so a single signal can legitimately register in
# multiple domains.

