[project]
name = "skynet-taste"
version = "2026.4.25"
description = "Cross-domain mood + preference scoring: decay-weighted vibe centroid, candidate ranking"
requires-python = ">=3.11"
dependencies = [
    "skynet-scoring>=2026.4.2",
    "skynet-vibe>=2026.4.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skynet_taste"]
