[project]
name = "skynet-matrix"
version = "2026.4.20.2"
description = "Skynet Matrix client, stream events, live streaming, and slash-command bot framework"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "matrix-nio>=0.24,<1.0",
    "redis>=5.0",
    "skynet-core>=2026.4.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
