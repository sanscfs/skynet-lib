[project]
name = "skynet-capture"
version = "2026.4.24"
description = "Shared ingest library: LLM-backed consumption extraction + Postgres pool helpers used by skynet-profiler, skynet-music, skynet-movies to turn natural-language Matrix messages into structured PG/Qdrant rows."
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
# Modules writing to Postgres need asyncpg. Keep it optional so the
# pure-extractor import path (no DB) stays lightweight for tests + CLI.
postgres = ["asyncpg>=0.30"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
