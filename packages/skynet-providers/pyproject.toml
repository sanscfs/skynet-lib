[project]
name = "skynet-providers"
version = "2026.4.21"
description = "Skynet LLM provider abstraction -- OpenAI-compatible chat_completion with URL-based Vault key dispatch (Mistral direct / OpenRouter / local Ollama)."
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "skynet-vault>=2026.4.19",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
