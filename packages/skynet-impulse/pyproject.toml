[project]
name = "skynet-impulse"
version = "2026.4.20"
description = "Skynet autonomous-impulse engine: homeostat, adaptive baseline, LLM gate/compose, detectors, archetype bandit. Domain-agnostic."
requires-python = ">=3.12"
dependencies = [
    "skynet-core>=2026.4.4",
    "numpy>=1.26",
    "redis>=5.0",
]

[project.optional-dependencies]
# Poisson repeat-intensity detector uses scipy.stats for the CDF tail probability.
scipy = [
    "scipy>=1.11",
]
# Uncertainty sampling detector defers to any sklearn-shaped classifier; the
# classifier itself is caller-provided, so sklearn is only a convenience extra
# for users who want a batteries-included reference implementation.
ml = [
    "scikit-learn>=1.3",
    "scipy>=1.11",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
